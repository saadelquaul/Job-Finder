<nav class="bg-white shadow-md sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-2 text-xl font-bold text-black hover:text-blue-700 transition">
        JobFinder

      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-6">
        <a routerLink="/" routerLinkActive="text-blue-600 font-semibold" [routerLinkActiveOptions]="{exact: true}"
           class="text-gray-600 hover:text-blue-600 transition text-sm">
          Rechercher
        </a>

        @if (authService.isAuthenticated) {
          <a routerLink="/favorites" routerLinkActive="text-blue-600 font-semibold"
             class="text-gray-600 hover:text-blue-600 transition text-sm">
            Favoris
          </a>
          <a routerLink="/applications" routerLinkActive="text-blue-600 font-semibold"
             class="text-gray-600 hover:text-blue-600 transition text-sm">
            Candidatures
          </a>
          <a routerLink="/profile" routerLinkActive="text-blue-600 font-semibold"
            class="text-gray-600 hover:text-blue-600 transition text-sm">
            Profil
          </a>
          <button (click)="logout()"
                  class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-red-600 transition cursor-pointer">
            Déconnexion
          </button>
        } @else {
          <a routerLink="/login" routerLinkActive="text-blue-600 font-semibold"
             class="text-gray-600 hover:text-blue-600 transition text-sm">
            Connexion
          </a>
          <a routerLink="/register"
             class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition">
            Inscription
          </a>
        }
      </div>

      <!-- Mobile menu button -->
      <button (click)="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-gray-600 cursor-pointer">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <!-- Mobile Navigation -->
    @if (mobileMenuOpen) {
      <div class="md:hidden pb-4 flex flex-col gap-2">
        <a routerLink="/" (click)="mobileMenuOpen = false"
           class="block text-gray-600 hover:text-blue-600 py-2 text-sm">Rechercher</a>

        @if (authService.isAuthenticated) {
          <a routerLink="/favorites" (click)="mobileMenuOpen = false"
             class="block text-gray-600 hover:text-blue-600 py-2 text-sm">Favoris</a>
          <a routerLink="/applications" (click)="mobileMenuOpen = false"
             class="block text-gray-600 hover:text-blue-600 py-2 text-sm">Candidatures</a>
             <a routerLink="/profile" (click)="mobileMenuOpen = false"
            class="block text-gray-600 hover:text-blue-600 py-2 text-sm">Profil</a>
          <button (click)="logout(); mobileMenuOpen = false"
                  class="text-left text-red-500 hover:text-red-600 py-2 text-sm cursor-pointer">Déconnexion</button>
        } @else {
          <a routerLink="/login" (click)="mobileMenuOpen = false"
             class="block text-gray-600 hover:text-blue-600 py-2 text-sm">Connexion</a>
          <a routerLink="/register" (click)="mobileMenuOpen = false"
             class="block text-blue-600 hover:text-blue-700 py-2 text-sm font-semibold">Inscription</a>
        }
      </div>
    }
  </div>
</nav>
