<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition">
  <div class="flex flex-col sm:flex-row justify-between gap-4">
    <div class="flex-1">
      <div class="flex items-center gap-3 mb-2">
        <h3 class="text-lg font-semibold text-gray-800">{{ application.title }}</h3>
        <span [class]="statusClass + ' px-2 py-0.5 rounded-full text-xs font-medium'">{{ statusLabel }}</span>
      </div>
      <p class="text-blue-600 text-sm font-medium">{{ application.company }}</p>
      <div class="flex items-center gap-3 text-sm text-gray-500 mt-1">
        <span>📍 {{ application.location }}</span>
        <span>📅 Ajouté le {{ application.dateAdded | date:'dd/MM/yyyy' }}</span>
      </div>

      <!-- Notes section -->
      <div class="mt-3">
        @if (editingNotes()) {
          <div class="flex flex-col gap-2">
            <textarea [(ngModel)]="editedNotes" rows="3"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none"
              placeholder="Ajoutez vos notes personnelles..."></textarea>
            <div class="flex gap-2">
              <button (click)="saveNotes()"
                class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm hover:bg-blue-700 transition cursor-pointer">
                Enregistrer
              </button>
              <button (click)="cancelEditingNotes()"
                class="text-gray-500 hover:text-gray-700 px-3 py-1 rounded-lg text-sm transition cursor-pointer">
                Annuler
              </button>
            </div>
          </div>
        } @else {
          @if (application.notes) {
            <p class="text-gray-600 text-sm bg-gray-50 px-3 py-2 rounded-lg cursor-pointer hover:bg-gray-100 transition"
              (click)="startEditingNotes()">
              📝 {{ application.notes }}
            </p>
          } @else {
            <button (click)="startEditingNotes()"
              class="text-blue-500 hover:text-blue-700 text-sm cursor-pointer">
              + Ajouter une note
            </button>
          }
        }
      </div>
    </div>

    <div class="flex sm:flex-col gap-2 shrink-0">
      <!-- Status buttons -->
      <select (change)="changeStatus($any($event.target).value)"
        class="border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none"
        [value]="application.status">
        <option value="en_attente">En attente</option>
        <option value="accepte">Accepté</option>
        <option value="refuse">Refusé</option>
      </select>

      <a [href]="application.url" target="_blank" rel="noopener"
        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition text-center">
        Voir l'offre
      </a>

      <button (click)="onRemove()"
        class="text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-lg text-sm transition cursor-pointer">
        Supprimer
      </button>
    </div>
  </div>
</div>
