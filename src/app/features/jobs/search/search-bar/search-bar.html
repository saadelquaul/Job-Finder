<div class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto">
  <div class="flex-1">
    <input type="text" [(ngModel)]="keyword"
      class="w-full px-4 py-3 rounded-lg focus:ring-2 ring-2 ring-blue-300 focus:ring-blue-100 outline-none"
      placeholder="Mots clés (ex: développeur, designer...)"
      (keyup.enter)="onSearch()">
  </div>
  <div class="flex-1">
    <input type="text" [(ngModel)]="location"
      class="w-full px-4 py-3 rounded-lg ring-2 ring-blue-300 focus:ring-2 focus:ring-blue-100 outline-none"
      placeholder="Localisation (ex: Paris, Remote...)"
      (keyup.enter)="onSearch()">
  </div>
  <button (click)="onSearch()"
    class="bg-white text-blue-600 px-8 py-3 rounded-lg font-semibold hover:bg-blue-50 transition cursor-pointer whitespace-nowrap">
     Rechercher
  </button>
</div>
