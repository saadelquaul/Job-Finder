<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex justify-between items-center hover:shadow-md transition">
  <div>
    <h3 class="text-lg font-semibold text-gray-800">{{ favorite.title }}</h3>
    <p class="text-blue-600 text-sm font-medium">{{ favorite.company }}</p>
    <p class="text-gray-500 text-sm">📍 {{ favorite.location }}</p>
  </div>
  <button (click)="onRemove()"
    class="text-red-500 hover:text-red-700 hover:bg-red-50 p-2 rounded-lg transition cursor-pointer" title="Retirer des favoris">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>
</div>
